<!DOCTYPE html>
<html>
  <head>
    <!-- Указываем кодировку страницы -->
    <meta charset="utf-8">

    <!-- Делаем страницу адаптивной для мобильных устройств -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Заголовок страницы -->
    <title>Task Tracker</title>

    <!-- Подключаем Bootstrap для красивого оформления -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
  </head>

  <body>
    <!-- CSRF-токен используется в Django для защиты форм  -->
    {% csrf_token %}

    <!-- Основной контейнер Bootstrap -->
    <div class="container">
      <br>

      <!-- Заголовок страницы с именем -->
      <h2><strong>Task Tracker Гошко Я.И. 📝</strong></h2>

      <br>

      <!-- Список задач -->
      <ul class="list-group">

        <!-- Каждая задача оформлена как элемент списка Bootstrap -->
        <li class="list-group-item mb-2">
          1. Проснуться
        </li>

        <li class="list-group-item mb-2">
          2. Сделать зарядку
        </li>

        <li class="list-group-item mb-2">
          3. Позавтракать
        </li>

        <li class="list-group-item mb-2">
          4. Изучить ГОСТ Р 56920
        </li>

        <li class="list-group-item mb-2">
          5. Выучить наизусть лекцию 7 по дисциплине УЖЦИС
        </li>

        <li class="list-group-item mb-2">
          6. Развернуть новый репозиторий на гите
        </li>

        <li class="list-group-item mb-2">
          7. Лечь спать
        </li>

      </ul>
    </div>

    <!-- Подключаем JS Bootstrap (нужен для некоторых интерактивных компонентов) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>

  </body>
</html>
